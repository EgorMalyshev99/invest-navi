type Asset {
  changePercent: Float!
  currency: String
  dataSource: MarketDataSource!

  """Indicative dividend yield % from T-Invest when available"""
  dividendYieldPercent: Float
  figi: String
  instrumentType: InstrumentType!
  lastPrice: Float!
  lotSize: Int!
  name: String!

  """Tinkoff sector key when available"""
  sector: String
  symbol: String!
  valueToday: Float!
}

type AssetInsight {
  forInvestor: String!
  provider: String
  risks: [String!]!
  source: AssetInsightSource!
  symbol: String!
  vsIndex: String
  whatChanged: String!
  whatIs: String!
  whyMatters: String!
}

enum AssetInsightSource {
  AI
  FALLBACK
}

type AuthAccess {
  accessToken: String!
}

type AuthUser {
  email: String!
  knowledgeLevel: KnowledgeLevel!
  name: String
  oauthProviders: [OAuthProvider!]!
  preferredLocale: PreferredLocale!
  userId: String!
}

type Bond {
  changePercent: Float!

  """Annual coupon rate %"""
  couponPercent: Float
  currency: String
  dataSource: MarketDataSource!
  faceValue: Float
  lastPrice: Float!
  lotSize: Int!

  """Maturity date YYYY-MM-DD"""
  maturityDate: String
  name: String!
  symbol: String!
  valueToday: Float!

  """Yield at current price %"""
  yieldAtPrice: Float
}

type BondInsight {
  couponAndMaturity: String!
  liquidityNote: String
  name: String!
  overview: String!
  provider: String
  questionsBeforeBuy: [String!]!
  rateSensitivity: String!
  risks: [String!]!
  source: AssetInsightSource!
  symbol: String!
  yieldContext: String!
}

input CreateDiaryEntryInput {
  action: DiaryAction!
  assetSymbol: String!
  confidence: Int
  failureCriteria: String
  horizon: DiaryHorizon!
  rationale: String
  risks: String
  successCriteria: String
}

input CreatePortfolioPositionInput {
  assetSymbol: String!

  """ISO date YYYY-MM-DD"""
  entryDate: String!
  entryPrice: Float!
  goal: String
  quantity: Float!
}

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

enum DiaryAction {
  BUY
  HOLD
  OBSERVE
  SELL
}

type DiaryEntry {
  action: DiaryAction!
  assetSymbol: String!
  confidence: Int
  createdAt: DateTime!
  failureCriteria: String
  horizon: DiaryHorizon!
  id: String!
  rationale: String
  reviewAt: DateTime
  risks: String
  snapshotIndexValue: Float
  snapshotPrice: Float
  status: DiaryStatus!
  successCriteria: String
  updatedAt: DateTime!
}

enum DiaryHorizon {
  LONG
  ONE_MONTH
  ONE_YEAR
  THREE_MONTHS
}

type DiaryHypothesisFeedback {
  gaps: [String!]!
  provider: String
  questions: [String!]!
  source: AssetInsightSource!
  strengths: [String!]!
  summary: String!
}

input DiaryHypothesisFeedbackInput {
  action: DiaryAction!
  assetSymbol: String!
  confidence: Int
  failureCriteria: String
  horizon: DiaryHorizon!
  locale: String = "ru"
  rationale: String
  risks: String
  successCriteria: String
}

type DiaryRetrospective {
  daysElapsed: Int!
  entryId: String!
  indexChangePercent: Float
  isReady: Boolean!
  priceChangePercent: Float
  provider: String
  questions: [String!]!
  source: AssetInsightSource!
  summary: String!
}

enum DiaryStatus {
  ACTIVE
  CANCELLED
  COMPLETED
}

type EducationalAnswer {
  answer: String!
  provider: String
  source: AssetInsightSource!
}

input EducationalAnswerInput {
  locale: String = "ru"
  question: String!
}

type FxRate {
  changePercent: Float!
  code: String!
  currentValue: Float!
  dataSource: MarketDataSource!
  name: String!
  valueToday: Float!
}

type Index {
  changePercent: Float!
  code: String!
  currentValue: Float!
  dataSource: MarketDataSource!
  name: String!
  valueToday: Float!
}

enum InstrumentType {
  Bond
  Currency
  Etf
  Index
  Share
}

enum KnowledgeLevel {
  ADVANCED
  BEGINNER
  INTERMEDIATE
}

input LoginInput {
  email: String!
  password: String!
}

enum MarketDataSource {
  Merged
  Moex
  Tinkoff
}

type MarketProvidersStatus {
  cacheTtlSeconds: Int!
  moex: Boolean!
  tinkoff: Boolean!
}

type Mutation {
  createDiaryEntry(input: CreateDiaryEntryInput!): DiaryEntry!
  createPortfolioPosition(input: CreatePortfolioPositionInput!): PortfolioPosition!
  deletePortfolioPosition(id: String!): Boolean!
  educationalAnswer(input: EducationalAnswerInput!): EducationalAnswer!
  login(input: LoginInput!): AuthAccess!
  register(input: RegisterInput!): AuthAccess!
  unlinkOAuthProvider(provider: OAuthProvider!): AuthUser!
  updateDiaryEntry(id: String!, input: UpdateDiaryEntryInput!): DiaryEntry!
  updatePortfolioPosition(id: String!, input: UpdatePortfolioPositionInput!): PortfolioPosition!
  updateProfile(input: UpdateProfileInput!): AuthUser!
}

enum OAuthProvider {
  GOOGLE
  YANDEX
}

type PortfolioAllocationSlice {
  key: String!
  label: String
  value: Float!
  weightPercent: Float!
}

type PortfolioPosition {
  assetName: String
  assetSymbol: String!
  costBasis: Float!
  createdAt: DateTime!
  currency: String
  currentPrice: Float
  entryDate: String!
  entryPrice: Float!
  goal: String
  id: String!
  instrumentType: InstrumentType
  marketValue: Float
  quantity: Float!
  unrealizedPl: Float
  unrealizedPlPercent: Float
  updatedAt: DateTime!
}

type PortfolioRiskHint {
  code: String!
  severity: PortfolioRiskSeverity!
  symbol: String
  weightPercent: Float
}

enum PortfolioRiskSeverity {
  Info
  Warning
}

type PortfolioSummary {
  byCurrency: [PortfolioAllocationSlice!]!
  byInstrumentType: [PortfolioAllocationSlice!]!
  bySymbol: [PortfolioAllocationSlice!]!
  positionsCount: Int!
  riskHints: [PortfolioRiskHint!]!
  totalCostBasis: Float!
  totalMarketValue: Float!
  totalUnrealizedPl: Float!
  totalUnrealizedPlPercent: Float
}

enum PreferredLocale {
  EN
  RU
}

type Query {
  """Single share by ticker (MOEX + Tinkoff when configured)"""
  asset(symbol: String!): Asset!
  assetInsight(locale: String = "ru", symbol: String!): AssetInsight!

  """Top MOEX assets by traded value (Tinkoff enrichment when configured)"""
  assets(limit: Int = 20): [Asset!]!

  """Single bond by MOEX security id"""
  bond(symbol: String!): Bond!
  bondInsight(locale: String = "ru", symbol: String!): BondInsight!

  """Top MOEX bonds by traded value (TQOB board)"""
  bonds(limit: Int = 20): [Bond!]!
  diaryEntries(status: DiaryStatus): [DiaryEntry!]!
  diaryEntry(id: String!): DiaryEntry!
  diaryHypothesisFeedback(input: DiaryHypothesisFeedbackInput!): DiaryHypothesisFeedback!
  diaryRetrospective(entryId: String!, locale: String = "ru"): DiaryRetrospective!

  """MOEX FX pairs vs RUB (USD, EUR, CNY) and RUB/USD reference"""
  fxRates: [FxRate!]!

  """Core MOEX indices (IMOEX, RGBI)"""
  indices: [Index!]!

  """Which market data providers are active"""
  marketProviders: MarketProvidersStatus!
  me: AuthUser!

  """Basic health check for GraphQL API"""
  ping: String!
  portfolioPosition(id: String!): PortfolioPosition!
  portfolioPositions: [PortfolioPosition!]!
  portfolioSummary: PortfolioSummary!

  """MOEX sector indices"""
  sectors: [Sector!]!

  """Educational weekly MOEX market review (cached per ISO week)"""
  weeklyMarketReview(locale: String = "ru"): WeeklyMarketReview!
}

input RegisterInput {
  email: String!
  name: String
  password: String!
}

type Sector {
  changePercent: Float!
  code: String!
  currentValue: Float!
  dataSource: MarketDataSource!
  name: String!
}

input UpdateDiaryEntryInput {
  action: DiaryAction
  confidence: Int
  failureCriteria: String
  horizon: DiaryHorizon
  rationale: String
  risks: String
  status: DiaryStatus
  successCriteria: String
}

input UpdatePortfolioPositionInput {
  assetSymbol: String

  """ISO date YYYY-MM-DD"""
  entryDate: String
  entryPrice: Float
  goal: String
  quantity: Float
}

input UpdateProfileInput {
  knowledgeLevel: KnowledgeLevel
  name: String
  preferredLocale: PreferredLocale
}

type WeeklyMarketReview {
  bondsAndRub: String!
  events: [String!]!
  generatedAt: DateTime!
  locale: String!
  provider: String
  risksForNextWeek: [String!]!
  sectors: [String!]!
  source: AssetInsightSource!
  summary: String!
  weekStart: DateTime!
}
