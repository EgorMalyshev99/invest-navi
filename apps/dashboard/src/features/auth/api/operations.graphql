mutation Login($input: LoginInput!) {
  login(input: $input) {
    accessToken
  }
}

mutation Register($input: RegisterInput!) {
  register(input: $input) {
    accessToken
  }
}

mutation UpdateProfile($input: UpdateProfileInput!) {
  updateProfile(input: $input) {
    userId
    email
    name
    knowledgeLevel
    preferredLocale
  }
}

query Me {
  me {
    userId
    email
    name
    knowledgeLevel
    preferredLocale
    oauthProviders
  }
}

mutation UnlinkOAuthProvider($provider: OAuthProvider!) {
  unlinkOAuthProvider(provider: $provider) {
    userId
    email
    name
    knowledgeLevel
    preferredLocale
    oauthProviders
  }
}
