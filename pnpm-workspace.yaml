packages:
  - 'apps/*'
  - 'packages/*'
overrides:
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
allowBuilds:
  '@apollo/protobufjs': true
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': true
  '@swc/core': true
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@types/node@25.9.1'
  - '@types/react@19.2.17'
  - '@eslint-react/ast@5.8.3'
  - '@eslint-react/core@5.8.3'
  - '@eslint-react/eslint-plugin@5.8.3'
  - '@eslint-react/eslint@5.8.3'
  - '@eslint-react/jsx@5.8.3'
  - '@eslint-react/shared@5.8.3'
  - '@eslint-react/var@5.8.3'
  - eslint-plugin-react-dom@5.8.3
  - eslint-plugin-react-jsx@5.8.3
  - eslint-plugin-react-naming-convention@5.8.3
  - eslint-plugin-react-rsc@5.8.3
  - eslint-plugin-react-web-api@5.8.3
  - eslint-plugin-react-x@5.8.3
